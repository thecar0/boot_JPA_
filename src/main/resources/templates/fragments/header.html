<!DOCTYPE html>
<html lang="en"
    xmlns:th="http://www.thymeleaf.org">

<div th:fragment="header">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="/image/original.jpg" alt="" width="50px" class="mx-3">
            </a>
            <a class="navbar-brand" href="#">BOOT_Project</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/board/register">register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/board/list">list</a>
                    </li>
                    <!-- 로그인 안 했을 때만 -->
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" href="/user/join">join</a>
                    </li>

                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" href="/user/login">login</a>
                    </li>

                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" href="/user/modify">
                            [[${#authentication.name}]] user modity
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN')">
                        <a class="nav-link" href="/user/userList">user list(ADMIN)</a>
                    </li>

                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" id="logout">logout</a>
                        <form action="/user/logout" method="post" id="logoutForm">
                            <!-- CSRF 토큰 추기 -->
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <script>
        document.getElementById("logout").addEventListener('click', (e)=>{
            // a 태그에 달린 href 동시 동작 가능성 없애기
            e.preventDefault();
            document.getElementById("logoutForm").submit();
        })
    </script>
</div>
</html>
