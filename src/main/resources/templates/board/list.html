<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content" class="container-md">
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold mb-0">
                📋 게시글 목록
            </h2>

            <small class="text-secondary">
                자유롭게 글을 작성해보세요.
            </small>

        </div>

        <a href="/board/register"
           class="btn btn-warning align-content-center">
            + 글쓰기
        </a>

    </div>
    <div>
        <div class="card-custom my-3">

            <form action="/board/list" class="row g-3 align-items-center mb-4">

                <div class="col-lg-3">
                    <select class="form-select search-select" name="type">
                        <option selected disabled>검색 옵션</option>
                        <option value="twc">전체</option>
                        <option value="t">제목</option>
                        <option value="w">작성자</option>
                        <option value="c">내용</option>
                        <option value="wt">제목 + 작성자</option>
                        <option value="tc">제목 + 내용</option>
                        <option value="cw">작성자 + 내용</option>
                    </select>
                </div>

                <div class="col-lg-7">
                    <input
                            class="form-control search-input"
                            name="keyword"
                            type="search"
                            placeholder="검색어를 입력하세요">
                </div>

                <input type="hidden" name="pageNo" value="1">

                <div class="col-lg-2 d-grid">
                    <button class="btn btn-warning">
                        🔍 검색
                    </button>
                </div>

            </form>

            <table class="table table-hover align-middle mb-0">
            <thead class="table-warning text-center">
            <tr>
                <th style="width: 10%">번호</th>
                <th>제목</th>
                <th style="width: 20%">작성자</th>
                <th style="width: 20%">작성일</th>
                <th style="width: 10%">조회수</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="board : ${ph.list}">
                <td class="text-center" th:text="${board.bno}"></td>

                <td>
                    <a th:href="@{/board/detail(bno=${board.bno})}"
                       th:text="${board.title}">
                    </a>
                    <span class="badge rounded-pill text-dark bg-warning-subtle border border-warning ms-2">
                        💬 [[${board.cmtQty}]]
                    </span>

                    <span class="badge rounded-pill text-dark bg-light border ms-1">
                        📎 [[${board.fileQty}]]
                    </span>
                </td>

                <td class="text-center" th:text="${board.writer}"></td>

                <td class="text-center"
                    th:text="${#temporals.format(board.regDate, 'yyyy-MM-dd')}"></td>

                <td class="text-center" th:text="${board.readCount}"></td>
            </tr>
            </tbody>
        </table>
        </div>
    </div>

<nav aria-label="Page navigation example">
    <ul class="pagination justify-content-center">
        <li class="page-item" th:classappend="${ph.prev eq false ? 'disabled' : ''}">
            <a class="page-link" th:href="@{/board/list(pageNo=${ph.startPage}-1)}" aria-label="Previous">
                <span aria-hidden="true">&laquo;</span>
            </a>
        </li>
        <th:block th:each="i:${#numbers.sequence(ph.startPage, ph.endPage)}" >
            <li class="page-item" th:classappend="${ph.pageNo == i} ? 'active' : ''"><a class="page-link" th:href="@{/board/list(pageNo=${i})}">[[${i}]]</a></li>
        </th:block>
        <li class="page-item" th:classappend="${ph.next eq false ? 'disabled' : ''}">
            <a class="page-link" th:href="@{/board/list(pageNo=${ph.endPage}+1)}" aria-label="Next">
                <span aria-hidden="true">&raquo;</span>
            </a>
        </li>
    </ul>
</nav>

</div>

</html>
