<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content" class="container py-5">

    <div class="card-custom text-center">

        <h1 class="display-5">
            📝 Board Project
        </h1>

        <p class="text-secondary mb-4">
            Spring Boot + JPA + MySQL 게시판 프로젝트
        </p>

        <img src="/image/original.jpg"
             class="img-fluid rounded-4 shadow"
             width="700">

        <div class="mt-4 home-btn-group">

            <a href="/board/list"
               class="btn btn-warning home-btn">
                게시글 보기
            </a>

            <a href="/board/register"
               class="btn btn-outline-dark home-btn">
                글 작성
            </a>

        </div>

    </div>

    <div class="card-custom mt-5">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">🔥 조회수 TOP 5 🔥</h3>

            <a href="/board/list" class="btn btn-outline-warning btn-sm">
                전체보기
            </a>
        </div>

        <table class="table align-middle">
            <thead>
            <tr>
                <th style="width:80px">순위</th>
                <th>제목</th>
                <th style="width:160px">작성자</th>
                <th style="width:120px">조회수</th>
            </tr>
            </thead>

            <tbody>

            <tr th:if="${#lists.isEmpty(topList)}">
                <td colspan="4" class="text-center text-secondary py-4">
                    등록된 게시글이 없습니다.
                </td>
            </tr>

            <tr th:each="board, stat : ${topList}">

                <td>
                <span class="badge bg-warning text-dark fs-6"
                      th:text="${stat.count}">
                </span>
                </td>

                <td>
                    <a th:href="@{/board/detail(bno=${board.bno})}"
                       th:text="${board.title}">
                    </a>

                    <span class="badge bg-primary ms-2"
                          th:if="${board.cmtQty > 0}"
                          th:text="${board.cmtQty}">
                </span>

                    <span class="badge bg-secondary ms-1"
                          th:if="${board.fileQty > 0}">
                    📎
                </span>
                </td>

                <td th:text="${board.writer}"></td>

                <td>
                    👁
                    <span th:text="${board.readCount}"></span>
                </td>

            </tr>

            </tbody>
        </table>

    </div>
    <script th:inline="javascript">
        const modMsg = [[${modMsg}]];
        if(modMsg === 'ok'){
            alert("회원정보가 수정되었습니다. 다시 로그인 해주세요.")
        }
    </script>

</div>
