<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content" class="container-md">
    <h1>Board Register Page</h1>

    <div class="card-custom">

    <form action="/board/register" method="post" enctype="multipart/form-data" class="my-5">
        <!-- CSRF 토큰 추기 -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
            <label for="t" class="form-label">TITLE</label>
            <input type="text" class="form-control" id="t" name="title" placeholder="title..." >
        </div>

        <div class="mb-3">
            <label for="w" class="form-label">WRITER</label>
            <input type="text" class="form-control" id="w" name="writer" th:value="${#authentication.name}" readonly>
        </div>

        <div class="mb-3">
            <label for="c" class="form-label">Example textarea</label>
            <textarea class="form-control" id="c" name="content" rows="10" cols="30"></textarea>
        </div>

        <!-- file upload 추가 -->
        <div class="mb-3">
            <input type="file" class="form-control" id="file" name="files" multiple
            style="display: none">
            <button type="button" id="trigger" class="btn btn-secondary">File Upload</button>
        </div>

        <!-- file print-->
        <div class="mb-3" id="fileZone"></div>

        <button type="submit" class="btn btn-warning" id="regBtn">create</button>

        <script th:src="@{/js/boardRegister.js}"></script>
    </form>
    </div>
</div>
</html>
