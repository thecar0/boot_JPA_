<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content" class="container-md">

    <h1 class="mb-4">👤 User Modify Page</h1>

    <form action="/user/modify" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <input type="hidden"
               name="email"
               th:value="${userDTO.email}">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card card-custom profile-card">

                    <div class="row g-0">

                        <!-- 왼쪽 사진 -->
                        <div class="col-md-4 profile-left">

                            <img src="/image/pic07.png"
                                 class="profile-img"
                                 alt="profile">

                        </div>

                        <!-- 오른쪽 정보 -->
                        <div class="col-md-8">

                            <div class="card-body">

                                <h3 class="mb-4">
                                    회원 정보
                                </h3>

                                <div class="mb-3">
                                    <label class="form-label">
                                        닉네임
                                    </label>

                                    <input type="text"
                                           name="nickName"
                                           class="form-control"
                                           th:value="${userDTO.nickName}">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">
                                        비밀번호
                                    </label>

                                    <input type="password"
                                           name="pwd"
                                           class="form-control"
                                           placeholder="새 비밀번호 입력">
                                </div>

                                <hr>

                                <p>
                                    <strong>이메일</strong><br>
                                    [[${userDTO.email}]]
                                </p>

                                <p>
                                    <strong>가입일</strong><br>
                                    [[${userDTO.regDate}]]
                                </p>

                                <p>
                                    <strong>마지막 로그인</strong><br>
                                    [[${userDTO.lastLogin}]]
                                </p>

                                <div class="d-flex align-items-center justify-content-between mt-4">

                                    <div>

                                        <th:block th:each="auths:${userDTO.authList}">
                                            <span class="badge rounded-pill text-bg-success me-1">
                                                [[${auths.role}]]
                                            </span>
                                        </th:block>

                                    </div>

                                    <div>

                                        <button type="submit"
                                                class="btn btn-warning me-2">
                                            수정
                                        </button>

                                        <a th:href="@{/user/remove}"
                                           class="btn btn-danger">
                                            탈퇴
                                        </a>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </form>

</div>
    <script th:inline="javascript">
        const modMsg = [[${modMsg}]];
        if(modMsg === 'fail'){
            alert("회원정보 수정 오류. 다시 시도 해주세요.")
        }
        const delMsg = [[${delMsg}]];
        if(delMsg === 'fail'){
            alert("회원정보 삭제 오류. 다시 시도 해주세요.")
        }
    </script>
</div>
</html>
